    <!-- Analytics Tracking Code -->
    <script>
        (function () {
            'use strict';
            var id = 'b86806be7d4e8e98';
            var endpoint = 'https://vtbpfkuteansazuqslre.supabase.co/functions/v1/collect';

            function getFingerprint() {
                var canvas = document.createElement('canvas');
                var ctx = canvas.getContext('2d');
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillText('analytics', 2, 2);
                var hash = canvas.toDataURL().split('').reduce(function (a, b) {
                    a = ((a << 5) - a) + b.charCodeAt(0);
                    return a & a;
                }, 0);
                var nav = [navigator.userAgent, navigator.language, screen.width + 'x' + screen.height, new Date().getTimezoneOffset()].join('|');
                return Math.abs(hash) + '_' + nav.split('').reduce(function (a, b) {
                    a = ((a << 5) - a) + b.charCodeAt(0);
                    return a & a;
                }, 0);
            }

            function getBrowser() {
                var ua = navigator.userAgent;
                if (ua.indexOf('Edg') > -1) return 'Edge';
                if (ua.indexOf('Firefox') > -1) return 'Firefox';
                if (ua.indexOf('Chrome') > -1) return 'Chrome';
                if (ua.indexOf('Safari') > -1) return 'Safari';
                if (ua.indexOf('Opera') > -1 || ua.indexOf('OPR') > -1) return 'Opera';
                return 'Other';
            }

            function getDevice() {
                var ua = navigator.userAgent;
                if (/(tablet|ipad|playbook|silk)|(android(?!.*mobi))/i.test(ua)) return 'tablet';
                if (/Mobile|iP(hone|od)|Android|BlackBerry|IEMobile/.test(ua)) return 'mobile';
                return 'desktop';
            }

            function getOS() {
                var ua = navigator.userAgent;
                if (ua.indexOf('Win') > -1) return 'Windows';
                if (ua.indexOf('Mac') > -1) return 'MacOS';
                if (ua.indexOf('Linux') > -1) return 'Linux';
                if (ua.indexOf('Android') > -1) return 'Android';
                if (ua.indexOf('like Mac') > -1) return 'iOS';
                return 'Other';
            }

            var start = Date.now();
            var fp = getFingerprint();
            var sent = false;
            var geo = { country: '', city: '' };

            // Get geo info from client side
            fetch('https://ipapi.co/json/', { mode: 'cors' })
                .then(function (r) { return r.json(); })
                .then(function (d) {
                    geo.country = d.country_name || '';
                    geo.city = d.city || '';
                })
                .catch(function () { });

            function track(retry) {
                if (sent && !retry) return;
                var url = endpoint + '?t=' + id + '&u=' + encodeURIComponent(location.pathname + location.search) + '&r=' + encodeURIComponent(document.referrer) + '&f=' + fp + '&b=' + getBrowser() + '&o=' + getOS() + '&d=' + getDevice() + '&p=' + encodeURIComponent(document.title) + '&s=' + Math.round((Date.now() - start) / 1000) + '&c=' + encodeURIComponent(geo.country) + '&y=' + encodeURIComponent(geo.city) + '&_=' + Date.now();

                fetch(url, { method: 'GET', mode: 'cors', credentials: 'omit' })
                    .then(function (r) {
                        if (r.ok) sent = true;
                        else if (!retry) setTimeout(function () { track(true); }, 1000);
                    })
                    .catch(function () {
                        if (!retry) setTimeout(function () { track(true); }, 1000);
                    });
            }

            if (document.readyState === 'complete') {
                setTimeout(track, 500);
            } else {
                window.addEventListener('load', function () { setTimeout(track, 500); });
            }
            window.addEventListener('beforeunload', function () { track(); });
        })();
    </script>

    <!-- Scripts -->
    <script>
        // Icons
        lucide.createIcons();

        // --------------------------------------------------------
        // CANVAS BACKGROUND ANIMATION (Copied from Hero)
        // --------------------------------------------------------
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let waves = [];

        const waveCount = 5;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initWaves();
        }
        window.addEventListener('resize', resize);

        class Wave {
            constructor(index, total) {
                this.index = index;
                this.total = total;
                this.phase = Math.random() * Math.PI * 2;
                this.speed = 0.002 + Math.random() * 0.004;
                const blue = 100 + Math.random() * 100;
                this.color = `rgba(${10 + index * 10}, ${20 + index * 10}, ${blue}, ${0.15 - (index * 0.02)})`;
                this.y = height * (0.4 + (index / total) * 0.4);
                this.amplitude = 50 + Math.random() * 100;
                this.frequency = 0.002 + Math.random() * 0.003;
            }

            update() {
                this.phase += this.speed;
            }

            draw() {
                ctx.beginPath();
                ctx.moveTo(0, height);
                for (let x = 0; x <= width; x += 10) {
                    const sine = Math.sin(x * this.frequency + this.phase);
                    ctx.lineTo(x, this.y + sine * this.amplitude);
                }
                ctx.lineTo(width, height);
                ctx.closePath();
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        function initWaves() {
            waves = [];
            for (let i = 0; i < waveCount; i++) {
                waves.push(new Wave(i, waveCount));
            }
        }

        resize();

        function animateCanvas() {
            ctx.clearRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'source-over';
            waves.forEach(wave => {
                wave.update();
                wave.draw();
            });
            requestAnimationFrame(animateCanvas);
        }
        animateCanvas();

        // --------------------------------------------------------
        // GSAP ENTRY ANIMATION
        // --------------------------------------------------------
        gsap.to(".gsap-elem", {
            y: 0,
            opacity: 1,
            duration: 1,
            stagger: 0.15,
            ease: "power3.out",
            delay: 0.2
        });
    </script>
